name: pureflowmotors
description: "A Flutter app for motorcycle financing with hardcoded loan options."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  youtube_player_iframe: ^5.1.0

  http: ^1.2.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  intl: ^0.18.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/app_icon.png"


flutter:
  uses-material-design: true

  assets:
    - lib/assets/bikes/
    - lib/assets/icon/app_icon.png


  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Light.ttf
        - asset: lib/assets/fonts/Poppins-Regular.ttf
        - asset: lib/assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: lib/assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter.ttf